server:
  port: 8080

spring:
  application:
    name: URL-Shortener

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5431/url_shortener}
    username: ${SPRING_DATASOURCE_USERNAME:url_shortener_user}
    password: ${SPRING_DATASOURCE_PASSWORD:url_shortener_pass}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl: ${SPRING_DATA_REDIS_SSL:false}

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: beans,health,info

app:
  base-url: ${APP_BASE_URL:http://localhost:8080/api/urls}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT:20}